services:
# :z is appended to bind mounts to make compatability with SELinux systems easier (e.g. Fedora)
  # MQTT service using Eclipse Mosquitto
  mqtt:
    image: eclipse-mosquitto:2.0.20 # Official Mosquitto MQTT broker image
    container_name: mqtt_broker
    ports:
      - "${MOSQUITTO_PORT}:1883" # Default MQTT port
      - "${MOSQUITTO_WS_PORT}:9001" # WebSocket port
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,z # Mount the custom configuration
      - mosquitto_config:/mosquitto/config # Custom configuration files
      - mosquitto_logs:/mosquitto/log # Logs directory
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Limit log size to 10MB
        max-file: "3"   # Keep a maximum of 3 log files

  # InfluxDB for time-series data storage
  influxdb:
    image: influxdb:2.7.10-alpine # Official InfluxDB image
    container_name: influxdb
    ports:
      - "${INFLUXDB_PORT}:8086" # InfluxDB HTTP API port
    volumes:
      - influxdb_data:/var/lib/influxdb # Data storage for persistence
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node-RED for visual programming
  node-red:
    image: nodered/node-red:4.0.5-22-minimal # Official Node-RED image
    container_name: node_red
    ports:
      - "${NODERED_PORT}:1880" # Node-RED web interface port
      - "53880:53880" # OPC-UA server port
    volumes:
      - ./config/nodered:/data:z  # Data storage for persistence, the flows.JSON should be placed here
    environment:
      - NODE_RED_ENABLE_PROJECTS=true # Enable Node-RED projects feature
    command: >
      /bin/bash -c "
        npm install node-red-contrib-opcua@0.2.337 node-red-dashboard node-red-contrib-influxdb@0.7.0 &&
        npm start
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana for data visualization
  grafana:
    env_file:
      - .env
    image: grafana/grafana:11.3.1 # Official Grafana image
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000" # Grafana web interface port
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:z
      - grafana_data:/var/lib/grafana # Data storage for persistence
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#Only named volumes that you are going to let docker manage need to be declared here.
#Bind mounts do not need to be declared.
volumes:
  mosquitto_data:
  mosquitto_config:
  mosquitto_logs:
  influxdb_data:
  node_red_data:
  grafana_data:
